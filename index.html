<!DOCTYPE html>
<html>
<head>
    <title>BSO-Pal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="layout">

        <aside class="left-panel">
            <h1>BSO-Pal</h1>
            <div class="info">
                <h2>Contact & Quick Info</h2>
                <ul id="info-list">
                    <li>BSO office number: 740-593-1951</li>
                </ul>
            </div>
        </aside>

        <main class="center-panel">
            <section class="chat-panel">
                <div id="chat-box">
                    <div class="message bot">Hi! I'm BSO-Pal, what can I help you with?</div>
                </div>

                <div class="input-area">
                    <input type="text" id="user-input" placeholder="Ask a question..." aria-label="Ask a question">
                    <button id="send-btn">Send</button>
                </div>
            </section>
        </main>

    </div>

    <script src="script.js"></script>

</body>
</html>
