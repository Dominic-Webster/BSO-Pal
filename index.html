<!DOCTYPE html>
<html>
<head>
    <title>BSO-Pal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>BSO-Pal</h1>

        <div id="chat-box">
            <div class="message bot">
                Hi! I'm BSO-Pal.
            </div>
        </div>

        <div class="input-area">
            <input
                type="text"
                id="user-input"
                placeholder="Ask a question..."
            >
            <button id="send-btn">Send</button>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
